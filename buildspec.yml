version: 0.2

phases:

  pre_build:
    commands:

      - aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin 866435872654.dkr.ecr.ap-southeast-2.amazonaws.com

      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)

      - IMAGE_TAG=$COMMIT_HASH

  build:
    commands:

      - docker build -t zenpipeline .

      - docker tag zenpipeline:latest ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/zenpipeline-repo:$IMAGE_TAG

      - docker tag zenpipeline-repo:latest 866435872654.dkr.ecr.ap-southeast-2.amazonaws.com/zenpipeline-repo:latest

  post_build:
    commands:

      - docker push ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/zenpipeline-repo:$IMAGE_TAG

      - docker push 866435872654.dkr.ecr.ap-southeast-2.amazonaws.com/zenpipeline-repo:latest